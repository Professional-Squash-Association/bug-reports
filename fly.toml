# fly.toml - Bug Reports API
# Centralised bug reporting service for PSA applications.

app = 'smm-bug-reports'
primary_region = 'lhr'
console_command = '/rails/bin/rails console'

[build]

[deploy]
  release_command = "./bin/rails db:prepare"

[env]
  PORT = '8080'
  PRIMARY_REGION = "lhr"

[processes]
  app = './bin/rails server -b 0.0.0.0 -p 8080'
  solidq = "bundle exec rake solid_queue:start"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 80

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '20s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'
